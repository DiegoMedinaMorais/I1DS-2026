<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Dinâmico</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>Html dinâmico com JavaScript</h1>

    <button id="btn" onclick="olaMundo()">Clique aqui</button>

    <p id="texto">Esse texto vai ser alterado!!!</p>
    <button onclick="mudarTexto()">Mudar texto</button>

    <form>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">

        <button onclick="enviarNome()">Enviar</button>
    </form>

    <form>
        <label>Primeiro número:</label>
        <input type="number" id="n1" name="n1">
        <label>Segundo número:</label>
        <input type="number" id="n2" name="n2">

        <button onclick="somar()">Somar</button>

        <p id="resultado"></p>
    </form>

    <!-- Script vai sempre no final do body-->
    <script src="js/script.js"></script>
</body>
</html>
